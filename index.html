<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OWASP BLT – Organization Dashboard</title>
  <meta name="description" content="Live dashboard for all OWASP-BLT GitHub repositories – stats, commits, issues, PRs and more." />
  
  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="./imgs/logo.png" />

  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            brand: {
              DEFAULT: '#E10101',
              hover:   '#b91c1c',
            },
          },
        },
      },
    };
  </script>

  <!-- Font Awesome CDN -->
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
    crossorigin="anonymous"
    referrerpolicy="no-referrer"
  />

  <!-- Custom styles -->
  <link rel="stylesheet" href="styles.css" />
</head>

<body class="bg-gray-50 text-gray-800 dark:bg-gray-900 dark:text-gray-100 min-h-screen font-sans">

<!-- ===== TOP NAV ===== -->
<header class="sticky top-0 z-50 bg-white dark:bg-gray-900 border-b border-gray-200 dark:border-gray-700 shadow-sm">
  <div id="header-inner" class="max-w-screen-xl mx-auto px-4 h-14 flex items-center justify-between gap-4">

    <!-- Logo -->
    <a href="https://blt.owasp.org" target="_blank" rel="noopener noreferrer" class="flex items-center gap-2 shrink-0">
      <img src="./imgs/owasp-blt-logo.svg" alt="OWASP BLT" class="h-8" />
    </a>

    <!-- Search -->
    <div class="relative flex-1 max-w-sm">
      <i class="fa-solid fa-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-sm" aria-hidden="true"></i>
      <input
        id="search-input"
        type="search"
        placeholder="Search repositories…"
        aria-label="Search repositories"
        class="w-full pl-9 pr-4 py-2 border border-gray-400 rounded-md text-sm bg-white dark:bg-gray-800 dark:border-gray-600 dark:text-gray-100 dark:placeholder-gray-400 focus-brand"
      />
    </div>

    <!-- Right controls -->
    <div class="flex items-center gap-2 shrink-0">
      <!-- Sort -->
      <select
        id="sort-select"
        aria-label="Sort repositories"
        class="hidden sm:block text-sm border border-gray-400 rounded-md px-3 py-2 bg-white dark:bg-gray-800 dark:border-gray-600 dark:text-gray-100 focus-brand"
      >
        <option value="stars">★ Stars</option>
        <option value="forks">⑂ Forks</option>
        <option value="open_issues_count">Issues</option>
        <option value="updated_at" selected>Updated</option>
        <option value="name">Name</option>
        <option value="created_at">Created</option>
        <option value="readme_chars">README Size</option>
        <option value="maturity">Maturity Score</option>
        <option value="agent_pr_count">Bot PRs</option>
      </select>

      <!-- View toggle -->
      <button
        id="view-table-btn"
        aria-label="Table view"
        class="p-2 rounded-md border border-gray-300 dark:border-gray-600 text-gray-600 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors"
        title="Table view (default)"
      >
        <i class="fa-solid fa-table-list text-sm" aria-hidden="true"></i>
      </button>
      <button
        id="view-card-btn"
        aria-label="Card view"
        class="p-2 rounded-md border border-gray-300 dark:border-gray-600 text-gray-600 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors"
        title="Card view"
      >
        <i class="fa-solid fa-grip text-sm" aria-hidden="true"></i>
      </button>

      <!-- Dark mode toggle -->
      <button
        id="dark-toggle"
        aria-label="Toggle dark mode"
        class="p-2 rounded-md border border-gray-300 dark:border-gray-600 text-gray-600 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors"
      >
        <i id="dark-icon" class="fa-solid fa-moon text-sm" aria-hidden="true"></i>
      </button>

      <!-- Screenshots link -->
      <a
        href="./screenshots.html"
        aria-label="Website Screenshots"
        title="Website Screenshots"
        class="p-2 rounded-md border border-gray-300 dark:border-gray-600 text-gray-600 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors"
      >
        <i class="fa-solid fa-camera text-sm" aria-hidden="true"></i>
      </a>

      <!-- GitHub link -->
      <a
        href="https://github.com/OWASP-BLT/owasp-blt.github.io"
        target="_blank"
        rel="noopener noreferrer"
        aria-label="OWASP-BLT dashboard repository on GitHub"
        class="p-2 rounded-md border border-gray-300 dark:border-gray-600 text-gray-600 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors"
      >
        <i class="fa-brands fa-github text-base" aria-hidden="true"></i>
      </a>
    </div>
  </div>
</header>

<!-- ===== MAIN LAYOUT ===== -->
<div id="main-layout" class="max-w-screen-xl mx-auto px-4 py-6 flex gap-6">

  <!-- ===== SIDEBAR ===== -->
  <aside id="main-sidebar" class="hidden lg:flex flex-col gap-2 w-52 shrink-0">
    <div id="label-filter-sidebar">
      <p class="text-xs font-semibold uppercase tracking-wider text-gray-500 dark:text-gray-400 mb-2 px-2">Labels</p>
      <div class="space-y-2 px-2">
        <div class="relative">
          <input
            id="label-search-input"
            type="text"
            placeholder="Search labels…"
            aria-label="Search labels"
            class="w-full px-2 py-1.5 border border-gray-300 dark:border-gray-600 rounded-md text-xs bg-white dark:bg-gray-800 dark:text-gray-100 dark:placeholder-gray-500 focus-brand"
          />
          <div
            id="label-dropdown"
            class="absolute top-full left-0 right-0 mt-1 bg-white dark:bg-gray-800 border border-gray-300 dark:border-gray-600 rounded-md shadow-lg hidden z-10 max-h-48 overflow-y-auto"
          >
            <ul id="label-list" class="space-y-0"></ul>
          </div>
        </div>
        <button
          id="clear-label-btn"
          class="w-full text-xs px-2 py-1 border border-gray-300 dark:border-gray-600 text-gray-600 dark:text-gray-300 rounded hover:bg-red-50 dark:hover:bg-red-900/20 hover:border-brand hover:text-brand transition-colors"
          title="Clear label filter"
        >
          <i class="fa-solid fa-times mr-1" aria-hidden="true"></i>Clear
        </button>
      </div>
    </div>

    <hr class="border-gray-200 dark:border-gray-700 my-2" />

    <nav aria-label="Filter by type">
      <p class="text-xs font-semibold uppercase tracking-wider text-gray-500 dark:text-gray-400 mb-2 px-2">Filter</p>
      <ul class="space-y-0.5">
        <li>
          <button data-filter="all" class="filter-btn nav-active w-full text-left px-3 py-2 rounded-md text-sm font-medium transition-colors hover:bg-gray-100 dark:hover:bg-gray-700">
            <i class="fa-solid fa-layer-group w-4 mr-2" aria-hidden="true"></i>All repos
          </button>
        </li>
        <li>
          <button data-filter="source" class="filter-btn w-full text-left px-3 py-2 rounded-md text-sm font-medium transition-colors hover:bg-gray-100 dark:hover:bg-gray-700">
            <i class="fa-solid fa-code-branch w-4 mr-2" aria-hidden="true"></i>Source
          </button>
        </li>
        <li>
          <button data-filter="fork" class="filter-btn w-full text-left px-3 py-2 rounded-md text-sm font-medium transition-colors hover:bg-gray-100 dark:hover:bg-gray-700">
            <i class="fa-solid fa-code-fork w-4 mr-2" aria-hidden="true"></i>Forks
          </button>
        </li>
        <li>
          <button data-filter="archived" class="filter-btn w-full text-left px-3 py-2 rounded-md text-sm font-medium transition-colors hover:bg-gray-100 dark:hover:bg-gray-700">
            <i class="fa-solid fa-archive w-4 mr-2" aria-hidden="true"></i>Archived
          </button>
        </li>
      </ul>
    </nav>

    <hr class="border-gray-200 dark:border-gray-700 my-2" />

    <nav aria-label="Sort options (mobile-friendly sidebar)">
      <p class="text-xs font-semibold uppercase tracking-wider text-gray-500 dark:text-gray-400 mb-2 px-2">Sort by</p>
      <ul class="space-y-0.5" id="sort-sidebar">
        <li><button data-sort="stars"            class="sort-btn w-full text-left px-3 py-2 rounded-md text-sm font-medium hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors"><i class="fa-solid fa-star w-4 mr-2" aria-hidden="true"></i>Stars</button></li>
        <li><button data-sort="forks"            class="sort-btn w-full text-left px-3 py-2 rounded-md text-sm font-medium hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors"><i class="fa-solid fa-code-fork w-4 mr-2" aria-hidden="true"></i>Forks</button></li>
        <li><button data-sort="open_issues_count" class="sort-btn w-full text-left px-3 py-2 rounded-md text-sm font-medium hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors"><i class="fa-solid fa-circle-dot w-4 mr-2" aria-hidden="true"></i>Issues</button></li>
        <li><button data-sort="updated_at"       class="sort-btn nav-active w-full text-left px-3 py-2 rounded-md text-sm font-medium hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors"><i class="fa-solid fa-clock w-4 mr-2" aria-hidden="true"></i>Updated</button></li>
        <li><button data-sort="created_at"       class="sort-btn w-full text-left px-3 py-2 rounded-md text-sm font-medium hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors"><i class="fa-solid fa-calendar-plus w-4 mr-2" aria-hidden="true"></i>Created</button></li>
        <li><button data-sort="name"             class="sort-btn w-full text-left px-3 py-2 rounded-md text-sm font-medium hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors"><i class="fa-solid fa-a w-4 mr-2" aria-hidden="true"></i>Name</button></li>
        <li><button data-sort="readme_chars"     class="sort-btn w-full text-left px-3 py-2 rounded-md text-sm font-medium hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors"><i class="fa-solid fa-file-lines w-4 mr-2" aria-hidden="true"></i>README Size</button></li>
        <li><button data-sort="maturity"         class="sort-btn w-full text-left px-3 py-2 rounded-md text-sm font-medium hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors"><i class="fa-solid fa-rocket w-4 mr-2" aria-hidden="true"></i>Maturity Score</button></li>
        <li><button data-sort="agent_pr_count"   class="sort-btn w-full text-left px-3 py-2 rounded-md text-sm font-medium hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors"><i class="fa-solid fa-robot w-4 mr-2" aria-hidden="true"></i>Bot PRs</button></li>
      </ul>
    </nav>

    <hr class="border-gray-200 dark:border-gray-700 my-2" />

    <div id="lang-filter-sidebar">
      <p class="text-xs font-semibold uppercase tracking-wider text-gray-500 dark:text-gray-400 mb-2 px-2">Language</p>
      <ul class="space-y-0.5" id="lang-list"></ul>
    </div>
  </aside>

  <!-- ===== CONTENT ===== -->
  <main class="flex-1 min-w-0 overflow-x-auto">
  <div id="content-inner">

    <!-- Mobile sort/filter bar -->
    <div class="flex lg:hidden items-center gap-2 mb-4 flex-wrap">
      <select
        id="sort-select-mobile"
        aria-label="Sort repositories"
        class="text-sm border border-gray-400 rounded-md px-3 py-2 bg-white dark:bg-gray-800 dark:border-gray-600 dark:text-gray-100 focus-brand flex-1"
      >
        <option value="stars">★ Stars</option>
        <option value="forks">⑂ Forks</option>
        <option value="open_issues_count">Issues</option>
        <option value="updated_at" selected>Updated</option>
        <option value="name">Name</option>
        <option value="created_at">Created</option>
        <option value="readme_chars">README Size</option>
        <option value="maturity">Maturity Score</option>
        <option value="agent_pr_count">Bot PRs</option>
      </select>
      <select
        id="filter-select-mobile"
        aria-label="Filter repositories"
        class="text-sm border border-gray-400 rounded-md px-3 py-2 bg-white dark:bg-gray-800 dark:border-gray-600 dark:text-gray-100 focus-brand flex-1"
      >
        <option value="all">All repos</option>
        <option value="source">Source</option>
        <option value="fork">Forks</option>
        <option value="archived">Archived</option>
      </select>
    </div>

    <!-- Repo grid -->
    <div id="repo-grid" class="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-3 gap-4">
      <!-- Skeleton cards -->
      <div class="skeleton h-48 rounded-xl"></div>
      <div class="skeleton h-48 rounded-xl"></div>
      <div class="skeleton h-48 rounded-xl"></div>
      <div class="skeleton h-48 rounded-xl"></div>
      <div class="skeleton h-48 rounded-xl"></div>
      <div class="skeleton h-48 rounded-xl"></div>
    </div>

    <!-- Repo table (default view) -->
    <div id="repo-table" class="overflow-x-auto hidden">
      <table class="border-collapse text-sm">
        <tbody>
          <tr><td colspan="14" class="py-2"><div class="skeleton h-8 rounded"></div></td></tr>
          <tr><td colspan="14" class="py-2"><div class="skeleton h-8 rounded"></div></td></tr>
          <tr><td colspan="14" class="py-2"><div class="skeleton h-8 rounded"></div></td></tr>
          <tr><td colspan="14" class="py-2"><div class="skeleton h-8 rounded"></div></td></tr>
          <tr><td colspan="14" class="py-2"><div class="skeleton h-8 rounded"></div></td></tr>
          <tr><td colspan="14" class="py-2"><div class="skeleton h-8 rounded"></div></td></tr>
        </tbody>
      </table>
    </div>
    <!-- Set initial view immediately to avoid skeleton flash -->
    <script>
      (function () {
        const v = localStorage.getItem('blt-view') || 'table';
        if (v === 'table') {
          const g = document.getElementById('repo-grid');
          const t = document.getElementById('repo-table');
          const s = document.getElementById('main-sidebar');
          const l = document.getElementById('main-layout');
          const h = document.querySelector('header');
          if (g) g.classList.add('hidden');
          if (t) t.classList.remove('hidden');
          if (s) s.classList.add('force-hidden');
          if (l) l.classList.add('table-view');
          if (h) h.classList.add('table-view-header');
        }
      })();
    </script>

    <!-- Error state -->
    <div id="error-state" class="hidden text-center py-16">
      <i class="fa-solid fa-triangle-exclamation text-4xl text-brand mb-3" aria-hidden="true"></i>
      <p class="font-semibold text-lg">Failed to load repositories</p>
      <p id="error-msg" class="text-sm text-gray-500 dark:text-gray-400 mt-1"></p>
      <button
        id="retry-btn"
        class="mt-4 px-5 py-2 bg-brand hover:bg-brand-hover text-white text-sm font-semibold rounded-md transition-colors"
      >
        <i class="fa-solid fa-rotate-right mr-2" aria-hidden="true"></i>Retry
      </button>
    </div>

    <!-- Empty state -->
    <div id="empty-state" class="hidden text-center py-16">
      <i class="fa-solid fa-box-open text-4xl text-gray-300 dark:text-gray-600 mb-3" aria-hidden="true"></i>
      <p class="font-semibold text-lg">No repositories match your search</p>
      <button
        id="clear-btn"
        class="mt-3 px-4 py-2 border border-brand text-brand text-sm font-semibold rounded-md hover:bg-brand hover:text-white transition-colors"
      >
        Clear filters
      </button>
    </div>

  </div><!-- #content-inner -->
  </main>
</div>

<!-- ===== FOOTER ===== -->
<footer class="mt-10 border-t border-gray-200 dark:border-gray-700 py-6 text-center text-xs text-gray-400 dark:text-gray-500">
  <p>
    Data sourced from the
    <a href="https://docs.github.com/en/rest" target="_blank" rel="noopener noreferrer" class="text-brand underline-offset-2 hover:underline">GitHub REST API</a>.
    Built for <a href="https://blt.owasp.org" target="_blank" rel="noopener noreferrer" class="text-brand underline-offset-2 hover:underline">OWASP BLT</a>.
  </p>
  <p id="footer-ts" class="mt-1"></p>
</footer>

<!-- ===== JAVASCRIPT ===== -->
<script src="script.js"></script>
</body>
</html>
