<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OWASP BLT – Website Screenshots</title>
  <meta name="description" content="Thumbnails of all OWASP-BLT project websites, captured automatically by GitHub Actions." />

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="./imgs/logo.png" />

  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            brand: {
              DEFAULT: '#E10101',
              hover:   '#b91c1c',
            },
          },
        },
      },
    };
  </script>

  <!-- Font Awesome CDN -->
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
    crossorigin="anonymous"
    referrerpolicy="no-referrer"
  />

  <!-- Custom styles -->
  <link rel="stylesheet" href="styles.css" />
</head>

<body class="bg-gray-50 text-gray-800 dark:bg-gray-900 dark:text-gray-100 min-h-screen font-sans">

<!-- ===== TOP NAV ===== -->
<header class="sticky top-0 z-50 bg-white dark:bg-gray-900 border-b border-gray-200 dark:border-gray-700 shadow-sm">
  <div class="max-w-screen-xl mx-auto px-4 h-14 flex items-center justify-between gap-4">

    <!-- Logo -->
    <a href="https://blt.owasp.org" target="_blank" rel="noopener noreferrer" class="flex items-center gap-2 shrink-0">
      <img src="./imgs/owasp-blt-logo.svg" alt="OWASP BLT" class="h-8" />
    </a>

    <!-- Nav links -->
    <div class="flex items-center gap-2 shrink-0">
      <a
        href="./index.html"
        class="text-sm font-medium px-3 py-2 rounded-md border border-gray-300 dark:border-gray-600 text-gray-600 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors"
      >
        <i class="fa-solid fa-table-list mr-1" aria-hidden="true"></i>Dashboard
      </a>

      <!-- Dark mode toggle -->
      <button
        id="dark-toggle"
        aria-label="Toggle dark mode"
        class="p-2 rounded-md border border-gray-300 dark:border-gray-600 text-gray-600 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors"
      >
        <i id="dark-icon" class="fa-solid fa-moon text-sm" aria-hidden="true"></i>
      </button>

      <!-- GitHub link -->
      <a
        href="https://github.com/OWASP-BLT/owasp-blt.github.io"
        target="_blank"
        rel="noopener noreferrer"
        aria-label="OWASP-BLT dashboard repository on GitHub"
        class="p-2 rounded-md border border-gray-300 dark:border-gray-600 text-gray-600 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors"
      >
        <i class="fa-brands fa-github text-base" aria-hidden="true"></i>
      </a>
    </div>
  </div>
</header>

<!-- ===== MAIN CONTENT ===== -->
<main class="max-w-screen-xl mx-auto px-4 py-8">

  <!-- Page heading -->
  <div class="mb-6">
    <h1 class="text-2xl font-bold text-gray-900 dark:text-gray-100 flex items-center gap-2">
      <i class="fa-solid fa-camera text-brand" aria-hidden="true"></i>
      Website Screenshots
    </h1>
    <p class="mt-1 text-sm text-gray-500 dark:text-gray-400">
      Thumbnails of all OWASP-BLT project websites, captured automatically by GitHub Actions.
      <a
        href="https://github.com/OWASP-BLT/owasp-blt.github.io/actions/workflows/screenshot-repos.yml"
        target="_blank"
        rel="noopener noreferrer"
        class="text-brand underline-offset-2 hover:underline ml-1"
      >Run the workflow</a> to refresh screenshots.
    </p>
  </div>

  <!-- Search bar -->
  <div class="relative max-w-sm mb-6">
    <i class="fa-solid fa-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-sm" aria-hidden="true"></i>
    <input
      id="search-input"
      type="search"
      placeholder="Search repositories…"
      aria-label="Search repositories"
      class="w-full pl-9 pr-4 py-2 border border-gray-400 rounded-md text-sm bg-white dark:bg-gray-800 dark:border-gray-600 dark:text-gray-100 dark:placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-brand focus:border-transparent"
    />
  </div>

  <!-- Loading state -->
  <div id="loading-state" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4">
    <div class="skeleton h-52 rounded-xl"></div>
    <div class="skeleton h-52 rounded-xl"></div>
    <div class="skeleton h-52 rounded-xl"></div>
    <div class="skeleton h-52 rounded-xl"></div>
    <div class="skeleton h-52 rounded-xl"></div>
    <div class="skeleton h-52 rounded-xl"></div>
    <div class="skeleton h-52 rounded-xl"></div>
    <div class="skeleton h-52 rounded-xl"></div>
  </div>

  <!-- Error state -->
  <div id="error-state" class="hidden text-center py-16">
    <i class="fa-solid fa-triangle-exclamation text-4xl text-brand mb-3" aria-hidden="true"></i>
    <p class="font-semibold text-lg">Failed to load repository data</p>
    <p id="error-msg" class="text-sm text-gray-500 dark:text-gray-400 mt-1"></p>
  </div>

  <!-- Empty state -->
  <div id="empty-state" class="hidden text-center py-16">
    <i class="fa-solid fa-box-open text-4xl text-gray-300 dark:text-gray-600 mb-3" aria-hidden="true"></i>
    <p class="font-semibold text-lg">No repositories match your search</p>
    <button
      id="clear-btn"
      class="mt-3 px-4 py-2 border border-brand text-brand text-sm font-semibold rounded-md hover:bg-brand hover:text-white transition-colors"
    >
      Clear search
    </button>
  </div>

  <!-- Screenshot grid -->
  <div id="screenshot-grid" class="hidden grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4"></div>

</main>

<!-- ===== FOOTER ===== -->
<footer class="mt-10 border-t border-gray-200 dark:border-gray-700 py-6 text-center text-xs text-gray-400 dark:text-gray-500">
  <p>
    Data sourced from the
    <a href="https://docs.github.com/en/rest" target="_blank" rel="noopener noreferrer" class="text-brand underline-offset-2 hover:underline">GitHub REST API</a>.
    Built for <a href="https://blt.owasp.org" target="_blank" rel="noopener noreferrer" class="text-brand underline-offset-2 hover:underline">OWASP BLT</a>.
  </p>
  <p id="footer-ts" class="mt-1"></p>
</footer>

<!-- ===== JAVASCRIPT ===== -->
<script>
/* ------------------------------------------------------------------ */
/*  DARK MODE                                                           */
/* ------------------------------------------------------------------ */
(function initDark() {
  const saved = localStorage.getItem('blt-dark');
  const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
  if (saved === 'dark' || (!saved && prefersDark)) {
    document.documentElement.classList.add('dark');
    const icon = document.getElementById('dark-icon');
    if (icon) icon.className = 'fa-solid fa-sun text-sm';
  }
})();

const darkToggle = document.getElementById('dark-toggle');
if (darkToggle) darkToggle.addEventListener('click', () => {
  const isDark = document.documentElement.classList.toggle('dark');
  localStorage.setItem('blt-dark', isDark ? 'dark' : 'light');
  const icon = document.getElementById('dark-icon');
  if (icon) icon.className = isDark
    ? 'fa-solid fa-sun text-sm'
    : 'fa-solid fa-moon text-sm';
});

/* ------------------------------------------------------------------ */
/*  HELPERS                                                             */
/* ------------------------------------------------------------------ */
function escapeHtml(str) {
  if (!str) return '';
  return str
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#039;');
}

/* ------------------------------------------------------------------ */
/*  LOAD DATA AND RENDER                                                */
/* ------------------------------------------------------------------ */
let allRepos = [];
let currentSearch = '';

async function loadData() {
  try {
    const resp = await fetch(`data.json?t=${Date.now()}`);
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const payload = await resp.json();
    allRepos = (payload.repos || payload || []).filter(r => r.homepage);

    // Update footer timestamp
    if (payload.generated_at) {
      const el = document.getElementById('footer-ts');
      if (el) el.textContent = `Last updated: ${new Date(payload.generated_at).toLocaleString()}`;
    }

    render();
  } catch (err) {
    document.getElementById('loading-state').classList.add('hidden');
    const errEl = document.getElementById('error-state');
    errEl.classList.remove('hidden');
    const msgEl = document.getElementById('error-msg');
    if (msgEl) msgEl.textContent = err.message;
  }
}

function screenshotPath(repoName) {
  return `./imgs/screenshots/${repoName}.png`;
}

function render() {
  const query = currentSearch.toLowerCase().trim();
  const repos = allRepos.filter(r =>
    !query ||
    r.name.toLowerCase().includes(query) ||
    (r.description || '').toLowerCase().includes(query) ||
    (r.homepage || '').toLowerCase().includes(query)
  );

  document.getElementById('loading-state').classList.add('hidden');

  const grid = document.getElementById('screenshot-grid');
  const emptyEl = document.getElementById('empty-state');

  if (repos.length === 0) {
    grid.classList.add('hidden');
    emptyEl.classList.remove('hidden');
    return;
  }

  emptyEl.classList.add('hidden');
  grid.classList.remove('hidden');

  // Build screenshot cards
  grid.innerHTML = repos.map(r => {
    const imgSrc = escapeHtml(screenshotPath(r.name));
    const homepageUrl = escapeHtml(r.homepage);
    const repoUrl = escapeHtml(r.html_url);
    const name = escapeHtml(r.name);
    const desc = escapeHtml(r.description || '');

    return `
      <div
        id="card-${escapeHtml(r.name)}"
        class="group bg-white dark:bg-gray-800 rounded-xl border border-gray-200 dark:border-gray-700 overflow-hidden shadow-sm hover:shadow-md transition-shadow flex flex-col"
      >
        <!-- Thumbnail -->
        <a href="${homepageUrl}" target="_blank" rel="noopener noreferrer" class="thumb-link block overflow-hidden bg-gray-100 dark:bg-gray-700 relative" style="height:160px;">
          <img
            src="${imgSrc}"
            alt="Screenshot of ${name}"
            class="w-full h-full object-cover object-top group-hover:scale-105 transition-transform duration-300"
            loading="lazy"
            data-missing-placeholder="1"
          />
        </a>

        <!-- Card body -->
        <div class="p-3 flex flex-col gap-1 flex-1">
          <div class="flex items-start justify-between gap-2">
            <span class="font-semibold text-sm text-gray-900 dark:text-gray-100 truncate">${name}</span>
            <div class="flex items-center gap-1 shrink-0">
              <a href="${repoUrl}" target="_blank" rel="noopener noreferrer"
                 aria-label="View ${name} on GitHub"
                 class="text-gray-400 hover:text-gray-600 dark:hover:text-gray-200 transition-colors text-xs">
                <i class="fa-brands fa-github" aria-hidden="true"></i>
              </a>
              <a href="${homepageUrl}" target="_blank" rel="noopener noreferrer"
                 aria-label="Visit ${name} website"
                 class="text-gray-400 hover:text-brand transition-colors text-xs">
                <i class="fa-solid fa-arrow-up-right-from-square" aria-hidden="true"></i>
              </a>
            </div>
          </div>
          ${desc ? `<p class="text-xs text-gray-500 dark:text-gray-400 line-clamp-2">${desc}</p>` : ''}
          <a href="${homepageUrl}" target="_blank" rel="noopener noreferrer"
             class="text-xs text-brand truncate hover:underline mt-auto">${homepageUrl}</a>
        </div>
      </div>
    `;
  }).join('');

  // Attach error handlers via JS to avoid inline onerror attributes
  grid.querySelectorAll('img[data-missing-placeholder]').forEach(img => {
    img.addEventListener('error', function onImgError() {
      const link = this.closest('.thumb-link');
      if (!link) return;
      const placeholder = document.createElement('div');
      placeholder.className = 'w-full h-full flex flex-col items-center justify-center text-gray-400 gap-2';
      const icon = document.createElement('i');
      icon.className = 'fa-solid fa-image text-3xl';
      icon.setAttribute('aria-hidden', 'true');
      const label = document.createElement('span');
      label.className = 'text-xs';
      label.textContent = 'No screenshot yet';
      placeholder.appendChild(icon);
      placeholder.appendChild(label);
      link.replaceChildren(placeholder);
    });
  });

}

/* ------------------------------------------------------------------ */
/*  SEARCH                                                              */
/* ------------------------------------------------------------------ */
const searchInput = document.getElementById('search-input');
if (searchInput) {
  searchInput.addEventListener('input', () => {
    currentSearch = searchInput.value;
    render();
  });
}

const clearBtn = document.getElementById('clear-btn');
if (clearBtn) {
  clearBtn.addEventListener('click', () => {
    currentSearch = '';
    if (searchInput) searchInput.value = '';
    render();
  });
}

/* ------------------------------------------------------------------ */
/*  INIT                                                                */
/* ------------------------------------------------------------------ */
loadData();
</script>
</body>
</html>
