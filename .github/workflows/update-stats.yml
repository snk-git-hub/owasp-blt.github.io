name: Update Stats and Deploy Pages

on:
  schedule:
    # Run at the top of every hour
    - cron: '0 * * * *'
  workflow_dispatch:
    # Allow manual trigger from the GitHub Actions UI
  push:
    branches:
      - main

# Only allow one deployment at a time
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  update-and-deploy:
    name: Update stats and deploy to GitHub Pages
    runs-on: ubuntu-latest
    permissions:
      contents: write   # read and commit the generated data.json
      pages: write      # deploy to GitHub Pages
      id-token: write   # obtain OIDC token for Pages deployment
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Generate data.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ORG: OWASP-BLT
          OUT_FILE: data.json
        run: python3 .github/scripts/generate_data.py

      - name: Commit updated data.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --cached --quiet || (git commit -m "chore: update data.json with latest stats" && git push)

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
